name: Build LumiX APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate gradlew
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      - name: Download yt-dlp
        run: |
          mkdir -p app/src/main/assets
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux_aarch64" -o app/src/main/assets/yt-dlp_arm64
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux_armv7l" -o app/src/main/assets/yt-dlp_armv7
          chmod +x app/src/main/assets/yt-dlp_*

      - name: Create google-services.json with debug variant
        run: |
          cat > app/google-services.json << 'EOF'
{
  "project_info": {
    "project_number": "464309606770",
    "project_id": "lumix-c55a9",
    "storage_bucket": "lumix-c55a9.firebasestorage.app"
  },
  "client": [
    {
      "client_info": {
        "mobilesdk_app_id": "1:464309606770:android:b361b559a76187d13425eb",
        "android_client_info": {
          "package_name": "com.sparkynox.lumix"
        }
      },
      "oauth_client": [],
      "api_key": [
        {
          "current_key": "AIzaSyDSoeh8DBJMnvNa7-84su5CAn-2AfCBI34"
        }
      ],
      "services": {
        "appinvite_service": {
          "other_platform_oauth_client": []
        }
      }
    },
    {
      "client_info": {
        "mobilesdk_app_id": "1:464309606770:android:b361b559a76187d13425eb",
        "android_client_info": {
          "package_name": "com.sparkynox.lumix.debug"
        }
      },
      "oauth_client": [],
      "api_key": [
        {
          "current_key": "AIzaSyDSoeh8DBJMnvNa7-84su5CAn-2AfCBI34"
        }
      ],
      "services": {
        "appinvite_service": {
          "other_platform_oauth_client": []
        }
      }
    }
  ],
  "configuration_version": "1"
}
EOF

      - name: Add default_web_client_id
        run: |
          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/google-ids.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <string name="default_web_client_id">464309606770-abc123.apps.googleusercontent.com</string>
</resources>
EOF

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LumiX-APK
          path: app/build/outputs/apk/debug/*.apk