name: Build LumiX APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate gradlew
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      - name: Create google-services.json
        run: |
          echo '{
            "project_info": {
              "project_number": "464309606770",
              "project_id": "lumix-c55a9"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:464309606770:android:b361b559a76187d13425eb",
                  "android_client_info": {
                    "package_name": "com.sparkynox.lumix"
                  }
                },
                "api_key": [
                  {
                    "current_key": "AIzaSyDSoeh8DBJMnvNa7-84su5CAn-2AfCBI34"
                  }
                ]
              }
            ]
          }' > app/google-services.json

      - name: Add string resources
        run: |
          mkdir -p app/src/main/res/values
          echo '<resources>
            <string name="default_web_client_id">464309606770-abc123.apps.googleusercontent.com</string>
          </resources>' > app/src/main/res/values/ids.xml

      - name: Build Release APKs
        id: buildRelease
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          ./gradlew assembleRelease --stacktrace || echo "status=failed" >> $GITHUB_OUTPUT

      - name: Build Debug APKs (Fallback)
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          ./gradlew assembleDebug --stacktrace

      - name: List APKs
        run: |
          echo "=== Found APKs ==="
          find app/build/outputs/apk -name "*.apk" | while read apk; do
            echo "- $apk"
            ls -lh "$apk"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "LumiX Build #${{ github.run_number }}"
          body: |
            ## LumiX APK Build
            **Commit:** ${{ github.event.head_commit.message }}
            ### Install:
            1. Download APK
            2. Enable Unknown sources
            3. Install!
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false

      - name: Upload Artifacts (Backup)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: LumiX-APKs-Build-${{ github.run_number }}
          path: app/build/outputs/apk/**/*.apk
          retention-days: 2