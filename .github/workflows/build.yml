name: Build LumiX APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate gradlew
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      - name: Download yt-dlp
        run: |
          mkdir -p app/src/main/assets
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux_aarch64" -o app/src/main/assets/yt-dlp_arm64
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux_armv7l" -o app/src/main/assets/yt-dlp_armv7
          chmod +x app/src/main/assets/yt-dlp_*

      - name: Use your google-services.json from secret
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          # Extract and set the web_client_id
          WEB_CLIENT_ID=$(grep -o '"web_client_id"[[:space:]]*:[[:space:]]*"[^"]*"' app/google-services.json | head -1 | cut -d'"' -f4)
          if [ ! -z "$WEB_CLIENT_ID" ]; then
            mkdir -p app/src/main/res/values
            echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><resources><string name=\"default_web_client_id\">$WEB_CLIENT_ID</string></resources>" > app/src/main/res/values/generated-ids.xml
          fi

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LumiX-APK
          path: app/build/outputs/apk/debug/*.apk