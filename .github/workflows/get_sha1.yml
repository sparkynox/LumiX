name: Get SHA-1

on:
  workflow_dispatch: # manual trigger

jobs:
  sha1:
    runs-on: ubuntu-latest
    steps:
      - name: Generate debug keystore and print SHA-1
        run: |
          mkdir -p ~/.android
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          
          echo "========== SHA-1 =========="
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android | grep "SHA1:"
          echo "==========================="
